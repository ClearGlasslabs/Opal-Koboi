name: Deploy Python project to Azure Function App

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'function_app/**'
      - 'functions/**'
      - 'host.json'
      - 'requirements.txt'
      - '.github/workflows/azure-functions-python.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.11'
  AZURE_FUNCTIONAPP_PACKAGE_PATH: ${{ vars.AZURE_FUNCTIONAPP_PACKAGE_PATH || 'api' }}
  AZURE_FUNCTIONAPP_NAME: ${{ vars.AZURE_FUNCTIONAPP_NAME }}

jobs:
  validate:
    name: Validate Azure Function package
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.detect.outputs.should_deploy }}
      package_path: ${{ steps.detect.outputs.package_path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect deployable Function App package
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_PATH="${AZURE_FUNCTIONAPP_PACKAGE_PATH:-api}"

          if [ ! -d "$PACKAGE_PATH" ]; then
            if [ -f "host.json" ]; then
              PACKAGE_PATH="."
            elif [ -d "function_app" ]; then
              PACKAGE_PATH="function_app"
            elif [ -d "functions" ]; then
              PACKAGE_PATH="functions"
            else
              echo "No Azure Function package found. Static GitHub Pages changes will not be deployed to Azure Functions."
              echo "should_deploy=false" >> "$GITHUB_OUTPUT"
              echo "package_path=$PACKAGE_PATH" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          if [ ! -f "$PACKAGE_PATH/host.json" ] && [ ! -f "host.json" ]; then
            echo "No host.json found in package path. Skipping Azure Functions deployment."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "package_path=$PACKAGE_PATH" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ ! -n "${AZURE_FUNCTIONAPP_NAME:-}" ]; then
            echo "AZURE_FUNCTIONAPP_NAME repository variable is not set. Skipping Azure Functions deployment."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "package_path=$PACKAGE_PATH" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          echo "package_path=$PACKAGE_PATH" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Azure Functions
    needs: validate
    if: needs.validate.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies into package
        shell: bash
        working-directory: ${{ needs.validate.outputs.package_path }}
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install --target=".python_packages/lib/site-packages" -r requirements.txt
          else
            echo "requirements.txt not found in package path; continuing without dependency install."
          fi

      - name: Deploy with publish profile
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ needs.validate.outputs.package_path }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true
