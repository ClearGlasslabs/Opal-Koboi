name: Deploy ClearGlass.ai static site

on:
  push:
    branches: [main]
    paths:
      - 'website/clearglass-ai/**'
      - '.github/workflows/deploy-clearglass-ai.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/clearglass-ai
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
