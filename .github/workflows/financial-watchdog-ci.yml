name: Financial Influence Watchdog CI

on:
  push:
    branches: [main]
    paths:
      - "intelligence/**"
      - "tests/test_entity_extractor.py"
      - ".github/workflows/financial-watchdog-ci.yml"
  pull_request:
    paths:
      - "intelligence/**"
      - "tests/test_entity_extractor.py"
      - ".github/workflows/financial-watchdog-ci.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
          show-progress: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install validation dependencies
        run: |
          set -euo pipefail
          python -m pip install --quiet --disable-pip-version-check --upgrade pip
          python -m pip install --quiet --disable-pip-version-check "pydantic>=2.7,<3" "openai>=1.40,<3" "anthropic>=0.34,<1" "pytest>=8,<9"

      - name: Compile production module
        run: python -m compileall -q intelligence

      - name: Run focused regression suite
        run: pytest -q tests/test_entity_extractor.py

  diagnose:
    name: Capture concise pytest diagnostic
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      summary: ${{ steps.regression.outputs.summary }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
          show-progress: false

      - name: Set up diagnostic Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install diagnostic dependencies
        run: python -m pip install --quiet --disable-pip-version-check "pydantic>=2.7,<3" "openai>=1.40,<3" "anthropic>=0.34,<1" "pytest>=8,<9"

      - name: Capture regression result
        id: regression
        shell: bash
        run: |
          set +e
          pytest -q tests/test_entity_extractor.py > /tmp/watchdog-pytest.log 2>&1
          code=$?
          cat /tmp/watchdog-pytest.log
          summary=$(python - <<'PY'
          from pathlib import Path
          lines = [line.strip() for line in Path('/tmp/watchdog-pytest.log').read_text().splitlines() if line.strip()]
          candidates = [line for line in lines if line.startswith(('FAILED ', 'ERROR ', 'E   '))]
          value = (candidates[-1] if candidates else (lines[-1] if lines else 'no output'))[:180]
          print(value.replace('%', ' percent ').replace('\r', ' ').replace('\n', ' '))
          PY
          )
          echo "summary=$summary" >> "$GITHUB_OUTPUT"
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

  diagnostic-report:
    needs: diagnose
    name: Watchdog diagnostic — ${{ needs.diagnose.outputs.summary }}
    runs-on: ubuntu-24.04
    steps:
      - name: Report concise diagnostic
        run: echo "${{ needs.diagnose.outputs.summary }}"
