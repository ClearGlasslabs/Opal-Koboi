name: Financial Influence Watchdog CI

on:
  push:
    branches: [main]
    paths:
      - "intelligence/**"
      - "tests/test_entity_extractor.py"
      - ".github/workflows/financial-watchdog-ci.yml"
  pull_request:
    paths:
      - "intelligence/**"
      - "tests/test_entity_extractor.py"
      - ".github/workflows/financial-watchdog-ci.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pydantic>=2.7,<3" "openai>=1.40,<3" "anthropic>=0.34,<1" "pytest>=8,<9" "ruff>=0.5,<1"

      - name: Compile production module
        run: python -m compileall -q intelligence

      - name: Lint production module and tests
        run: ruff check intelligence tests/test_entity_extractor.py

      - name: Run focused test suite
        run: pytest -q tests/test_entity_extractor.py
