name: Financial Influence Watchdog CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "intelligence/**"
      - "tests/test_entity_extractor.py"
      - "pyproject.toml"
      - ".github/workflows/financial-watchdog-ci.yml"
  pull_request:
    paths:
      - "intelligence/**"
      - "tests/test_entity_extractor.py"
      - "pyproject.toml"
      - ".github/workflows/financial-watchdog-ci.yml"

permissions:
  contents: read

concurrency:
  group: financial-watchdog-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
          show-progress: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and validation dependencies
        run: |
          set -euo pipefail
          python -m pip install --quiet --disable-pip-version-check --upgrade pip
          python -m pip install --quiet --disable-pip-version-check -e ".[providers,dev]"

      - name: Compile production modules
        run: python -m compileall -q intelligence

      - name: Lint production module and focused tests
        run: ruff check intelligence tests/test_entity_extractor.py

      - name: Run focused test suite with coverage gate
        run: python -m pytest -q tests/test_entity_extractor.py --cov=intelligence --cov-report=term-missing --cov-fail-under=75

      - name: Validate CLI installation
        run: clearglass-watchdog --help >/dev/null
