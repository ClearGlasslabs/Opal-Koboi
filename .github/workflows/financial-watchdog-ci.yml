name: Financial Influence Watchdog CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "intelligence/**"
      - "tests/test_entity_extractor.py"
      - "pyproject.toml"
      - ".github/workflows/financial-watchdog-ci.yml"
  pull_request:
    paths:
      - "intelligence/**"
      - "tests/test_entity_extractor.py"
      - "pyproject.toml"
      - ".github/workflows/financial-watchdog-ci.yml"

permissions:
  contents: read

concurrency:
  group: financial-watchdog-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[providers,dev]"

      - name: Compile production modules
        run: python -m compileall -q intelligence

      - name: Lint production module and focused tests
        run: ruff check intelligence tests/test_entity_extractor.py

      - name: Run focused test suite with coverage gate
        run: pytest -q tests/test_entity_extractor.py --cov=intelligence --cov-report=term-missing --cov-fail-under=75

      - name: Validate CLI installation
        run: clearglass-watchdog --help >/dev/null
